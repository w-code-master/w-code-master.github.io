<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Авторизация</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body class="page_login-social">
		<header class="header">
			<div class="header-content">
				<div class="d-flex justify-content-center mt-5 mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center pt-2 pb-4">
					<h1 class="heading-1 color-eee mb-3 anim-fadeInUp">Авторизация</h1>
					<p class="header__description weight-500 anim-fadeInUp delay-01s">Войдите в свой аккаунт, чтобы продолжить</p>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content px-4">
			<div class="block-white radius-10 mx-3">
				<form class="row gy-3 py-1 px-2">
					<div class="col-12 pt-1 anim-fadeInUp delay-01s">
						<a class="btn _telegram" href="#">
							<svg class="btn__icon me-1" width="15" height="14">
								<use href="img/svg/sprite.svg#telegram"></use>
							</svg>
							<span class="weight-600">Продолжить через Телеграм</span>
						</a>
					</div>
					<div class="col-12 pt-1 anim-fadeInUp delay-02s">
						<a class="btn _vk" href="#">
							<svg class="btn__icon me-1" width="19" height="19">
								<use href="img/svg/sprite.svg#vk"></use>
							</svg>
							<span class="weight-600">Продолжить через Вконтакте</span>
						</a>
					</div>
					<div class="col-12 pt-1 anim-fadeInUp delay-03s">
						<a class="btn _max" href="#">
							<svg class="btn__icon me-1" width="16" height="15">
								<use href="img/svg/sprite.svg#max"></use>
							</svg>
							<span class="weight-600">Продолжить через Max</span>
						</a>
					</div>
				</form>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
