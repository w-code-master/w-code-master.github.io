<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Заявка на подбор</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-bar">
				<div class="row">
					<div class="col-auto">
						<a class="btn-dark">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon _arrow" width="8" height="13">
									<use href="img/svg/sprite.svg#arrow-bold"></use>
								</svg>
							</div>
						</a>
					</div>
					<div class="col">
						<a class="btn-dark d-flex">
							<div class="btn-dark__inner">
								<img class="header__logo mt-1" src="img/logo.png" alt="logo" />
							</div>
						</a>
					</div>
					<div class="col-auto">
						<a class="btn-dark _inverse">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon" width="18" height="18">
									<use href="img/svg/sprite.svg#user-people"></use>
								</svg>
							</div>
						</a>
					</div>
				</div>
			</div>
			<div class="header-content px-3 text-center">
				<h1 class="heading-2">Документация</h1>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
			<div class="header-bg">
				<img src="img/header/auto-1.jpg" alt="#" />
			</div>
		</header>

		<main class="main-content px-4">
			<div class="block-white radius-10 mb-4 anim-fadeInLeft">
				<h6 class="pt-2 pb-2 mb-1 text-15">Выберите необходимое в списке ниже, документ&nbsp;будет открыт в&nbsp;приложении</h6>
				<ul class="list pt-3 pb-2 text-13">
					<li class="list__item">
						<div class="list__content"><span class="color-8e">Агентский договор для работы с&nbsp;компанией</span></div>
					</li>
					<li class="list__item">
						<div class="list__content"><span class="color-8e">Порядок работы с компанией по&nbsp;этапам</span></div>
					</li>
					<li class="list__item">
						<div class="list__content"><span class="color-8e">Мы на Rusprofie.ru</span></div>
					</li>
				</ul>
			</div>
			<div class="row justify-content-center px-3 g-3 mb-5">
				<div class="col-4">
					<a class="card-dark" href="#">
						<div class="row p-3 g-1 align-items-center">
							<div class="col">
								<h5 class="text-13">Договор</h5>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img _width-55">
								<img class="img-cover" src="img/category/doc-4.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-4">
					<a class="card-dark" href="#">
						<div class="row p-3 g-1 align-items-center">
							<div class="col">
								<h5 class="text-13">Этапы работы</h5>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img _width-55">
								<img class="img-cover" src="img/category/doc-5.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-4">
					<a class="card-dark" href="#">
						<div class="row p-3 g-1 align-items-center">
							<div class="col">
								<h5 class="text-13">Rusprofile.ru</h5>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img _width-55">
								<img class="img-cover" src="img/category/rusprofile.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
			</div>
			<div class="row gy-3 mt-auto">
				<div class="col-12 px-2">
					<a href="#" class="btn _outline">
						<span class="weight-600">Вернутся в меню</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#back"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
