<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Связь с руководством компании</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-content">
				<div class="d-flex justify-content-center mt-5 mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center pt-2 pb-4">
					<h2 class="heading-2 color-eee mb-3 anim-fadeInUp">Связь с руководством компании Priority Auto</h2>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content px-4">
			<div class="d-flex justify-content-center">
				<div class="block-white radius-10 px-5 mx-2 mb-4 anim-fadeInLeft">
					<p class="color-53 text-15 line-height-140 text-center">
						<strong class="weight-700 color-primarylight">
							Ваше обращение <br />
							отправлено в обработку.
						</strong>
						<br />
						<span class="color-black">
							Ожидайте, с Вами свяжутся <br />
							в ближайшее время
						</span>
					</p>
				</div>
			</div>
			<div class="row gy-3 px-2 py-3 mb-4">
				<div class="col-12 anim-bounceIn delay-02s">
					<div class="px-4 py-3 border-e4 radius-10">
						<div class="px-2 pt-1">
							<div class="weight-500 color-b7 mb-2">Отправленные медиа</div>
							<div class="text-15 weight-600">Фото_уставшего_лица.jpg</div>
						</div>
					</div>
				</div>
				<div class="col-12 anim-bounceIn delay-03s">
					<div class="px-4 py-3 border-e4 radius-10">
						<div class="px-2 pt-1">
							<div class="weight-500 color-b7 mb-2">Введенный текст:</div>
							<div class="text-15 weight-600">Я устал ждать машину, когда она уже приедет в Россию, спасибо</div>
						</div>
					</div>
				</div>
			</div>
			<div class="row px-2 gy-3 mt-auto justify-content-center">
				<div class="col-12 anim-bounceIn">
					<a href="#" class="btn _primary">
						<span class="weight-500">Вернутся назад</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#back"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
