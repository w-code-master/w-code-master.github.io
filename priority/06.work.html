<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Работа с юридическими лицами</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-content">
				<div class="d-flex justify-content-center mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center pt-2 pb-4">
					<h2 class="heading-2 color-eee mb-3 anim-fadeInUp">Работа с&nbsp;юридическими лицами с&nbsp;возвратом НДС в&nbsp;Priority&nbsp;Auto</h2>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content px-4">
			<div class="block-white radius-10 mx-2 mb-5 anim-fadeInLeft">
				<div class="p-2 text-15 line-height-140 text-center">
					<h6 class="color-primarylight weight-600 mb-4 pb-2">
						Наша компания имеет&nbsp;sвозможность <br />
						привоза&nbsp;ТС для&nbsp;юр.&nbsp;лиц&nbsp;в&nbsp;РФ <br />
						с возвратом НДС
					</h6>
					<div class="">
						С условиями и&nbsp;порядком&nbsp;работы <br />
						ознакомьтесь по кнопке&nbsp;ниже
					</div>
				</div>
			</div>
			<div class="row gy-3 mx-0 mt-auto justify-content-center">
				<div class="col-12 px-2 anim-bounceIn">
					<a href="#" class="btn">
						<span class="weight-500">Заявка на подбор</span>
						<svg class="btn__icon _fill-stroke" width="14" height="14">
							<use href="img/svg/sprite.svg#mail"></use>
						</svg>
					</a>
				</div>
				<div class="col-6 px-2 anim-bounceIn delay-01s">
					<a href="#" class="btn _primary">
						<span class="weight-500">Условия</span>
					</a>
				</div>
				<div class="col-6 px-2 anim-bounceIn delay-02s">
					<a href="#" class="btn _primary">
						<span class="weight-500">Вернутся назад</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#back"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
