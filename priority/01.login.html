<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Авторизация</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-content">
				<div class="d-flex justify-content-center mt-5 mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center pt-2 pb-4">
					<h1 class="heading-1 color-eee mb-3 anim-fadeInUp">Авторизация</h1>
					<p class="header__description weight-500 anim-fadeInUp delay-01s">Войдите в свой аккаунт, чтобы продолжить</p>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content">
			<div class="block-white radius-15">
				<form class="row gy-4 py-2">
					<div class="col-12 anim-fadeInUp delay-01s">
						<input type="text" name="name" autocomplete="name" placeholder="Ваше имя" required />
					</div>
					<div class="col-12 anim-fadeInUp delay-02s">
						<input type="tel" name="tel" autocomplete="tel" placeholder="+7 (999) 999-99-99" required />
					</div>
					<div class="col-12 anim-bounceIn delay-03s">
						<button class="btn" type="submit">
							<span class="weight-500">Войти</span>
							<svg class="btn__icon _fill-stroke" width="14" height="14">
								<use href="img/svg/sprite.svg#entry"></use>
							</svg>
						</button>
					</div>
					<div class="col-12 pt-2 anim-fadeInUp delay-05s">
						<p class="text-14 text-center weight-500">
							<span class="color-8e">Нет аккаунта?</span>
							<a class="link _black" href="#">Зарегистрироваться</a>
						</p>
					</div>
				</form>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
