<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Авторизация</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body class="page-dark">
		<header class="header">
			<div class="header-bar">
				<div class="row">
					<div class="col-auto">
						<a class="btn-dark">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon _arrow" width="8" height="13">
									<use href="img/svg/sprite.svg#arrow-bold"></use>
								</svg>
							</div>
						</a>
					</div>
					<div class="col">
						<a class="btn-dark d-flex">
							<div class="btn-dark__inner">
								<img class="header__logo mt-1" src="img/logo.png" alt="logo" />
							</div>
						</a>
					</div>
					<div class="col-auto">
						<a class="btn-dark _inverse">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon" width="18" height="18">
									<use href="img/svg/sprite.svg#user-people"></use>
								</svg>
							</div>
						</a>
					</div>
				</div>
			</div>
			<div class="header-content text-center">
				<h1 class="heading-2">Авторизация</h1>
				<p class="header__description weight-500">Войдите в свой аккаунт, чтобы продолжить</p>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
			<div class="header-bg">
				<img src="img/header/auto-1.jpg" alt="#" />
			</div>
		</header>

		<main class="main-content px-4">
			<div class="block-dark mx-2 mb-4">
				<div class="block-dark__inner">
					<form class="row gy-4">
						<div class="col-12">
							<input class="input _white-outline" type="text" name="name" autocomplete="name" placeholder="Ваше имя" required />
						</div>
						<div class="col-12">
							<input class="input _white-outline" type="tel" name="tel" autocomplete="tel" placeholder="+7 (999) 999-99-99" required />
						</div>
						<div class="col-12">
							<button class="btn _primary" type="submit">
								<span class="weight-500">Авторизоваться</span>
								<svg class="btn__icon _fill-stroke" width="14" height="14">
									<use href="img/svg/sprite.svg#entry"></use>
								</svg>
							</button>
						</div>
					</form>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
