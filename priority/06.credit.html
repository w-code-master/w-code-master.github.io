<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Кредитование</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header pt-5">
			<div class="header-content">
				<div class="d-flex mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="pt-2 pb-4">
					<h2 class="heading-2 color-eee mb-3 anim-fadeInUp">
						Кредитование <br />
						с аккредитацией <br />
						от Priority Auto
					</h2>
					<p class="header__description weight-500 anim-fadeInUp delay-01s">
						Наша компания имеет специальное соглашение <br />
						со следующими банками на получение <br />
						кредита при работе с нами
					</p>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content">
			<div class="block-white radius-15 px-0 mb-5 anim-fadeInLeft">
				<div class="list _border pt-2 text-15 weight-600">
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">Сбербанк</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/sberbank.svg" alt="sberbank" />
							</div>
						</div>
					</div>
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">ВТБ</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/vtb.svg" alt="vtb" />
							</div>
						</div>
					</div>
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">ПСБ</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/psb.svg" alt="psb" />
							</div>
						</div>
					</div>
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">Альфа банк</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/alfabank.svg" alt="alfabank" />
							</div>
						</div>
					</div>
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">Т-банк</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/tbank.svg" alt="tbank" />
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="px-4 py-2 d-flex justify-content-center anim-fadeInDown delay-01s">
				<p class="text-center text-15 weight-500 max-width-300 mb-3"> Ознакомьтесь с&nbsp;условиями получения кредита для покупки ТС за&nbsp;границей </p>
			</div>
			<div class="row gy-3 px-4 mx-0 mt-auto justify-content-center">
				<div class="col-12 px-2 anim-bounceIn delay-02s">
					<a href="#" class="btn">
						<span class="weight-500">Заявка на подбор</span>
						<svg class="btn__icon _fill-stroke" width="14" height="14">
							<use href="img/svg/sprite.svg#mail"></use>
						</svg>
					</a>
				</div>
				<div class="col-6 px-2 anim-bounceIn delay-01s">
					<a href="#" class="btn _primary">
						<span class="weight-500">Условия</span>
					</a>
				</div>
				<div class="col-6 px-2 anim-bounceIn delay-02s">
					<a href="#" class="btn _primary">
						<span class="weight-500">Вернутся назад</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#back"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
