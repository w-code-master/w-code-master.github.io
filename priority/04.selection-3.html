<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Заявка на подбор</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-content">
				<div class="d-flex justify-content-center mt-5 mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center pt-2 pb-4">
					<h2 class="heading-2 color-eee mb-3 anim-fadeInUp">Заявка на подбор</h2>
					<p class="header__description weight-500 anim-fadeInUp delay-01s">
						Пройдите опрос из 3х шагов и менеджер <br />
						свяжется с вами в ближайшее время
					</p>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content">
			<div class="block-white radius-10 mb-4 anim-fadeInLeft">
				<div class="row gy-3 mb-3">
					<div class="col-12">
						<div class="d-flex">
							<div class="badge align-self-start">Шаг&nbsp;3</div>
							<p class="px-3 py-1 text-13 weight-500">Напишите: планируемый бюджет в России</p>
						</div>
					</div>
					<div class="col-12">
						<form>
							<input class="input _small" type="text" name="model-tc" placeholder="до 2 000 000 рублей" />
						</form>
					</div>
				</div>
			</div>
			<div class="px-4 py-3 mx-2 mb-4 anim-fadeInUp delay-01s">
				<h6 class="pt-1 pb-2 mb-1 text-15">Введенные данные:</h6>
				<ul class="list py-3 text-13">
					<li class="list__item">
						<div class="list__content"><span class="color-8e">Марка, модель ТС:</span> Honda Freed 1.5 G Honda</div>
					</li>
					<li class="list__item">
						<div class="list__content"><span class="color-8e">Год и желаемый пробег:</span> 2021 год, 20т. км пробег</div>
					</li>
				</ul>
			</div>
			<div class="row gy-3 px-4 mx-0 mt-auto justify-content-center">
				<div class="col-12 px-2 anim-bounceIn">
					<a href="#" class="btn _primary">
						<span class="weight-500">Вернутся назад</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#back"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
