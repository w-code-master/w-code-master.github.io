<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Связь с руководством компании</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-bar">
				<div class="row">
					<div class="col-auto">
						<a class="btn-dark">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon _arrow" width="8" height="13">
									<use href="img/svg/sprite.svg#arrow-bold"></use>
								</svg>
							</div>
						</a>
					</div>
					<div class="col">
						<a class="btn-dark d-flex">
							<div class="btn-dark__inner">
								<img class="header__logo mt-1" src="img/logo.png" alt="logo" />
							</div>
						</a>
					</div>
					<div class="col-auto">
						<a class="btn-dark _inverse">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon" width="18" height="18">
									<use href="img/svg/sprite.svg#user-people"></use>
								</svg>
							</div>
						</a>
					</div>
				</div>
			</div>
			<div class="header-content px-3 text-center">
				<h1 class="heading-2">Запрос на доп. услуги</h1>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
			<div class="header-bg">
				<img src="img/header/auto-1.jpg" alt="#" />
			</div>
		</header>

		<main class="main-content px-4">
			<div class="bg-primarylight radius-10 p-4 mb-4">
				<p class="text-15 text-center py-2">
					<span class="weight-300">
						Ваше обращение <br />
						отправлено в обработку.
					</span>
					<br />
					<span class="weight-500">
						Ожидайте, с Вами свяжутся <br />
						в ближайшее время
					</span>
				</p>
			</div>
			<div class="text-13 weight-600 color-53 px-2 mb-2">Введенные данные:</div>
			<div class="row gy-3 px-2 py-3 mb-4">
				<div class="col-12">
					<div class="p-4 border-e4 radius-10">
						<div class="text-13 weight-500 px-2 pt-1">
							<div class="color-8e mb-2">Отправленные медиа</div>
							<div class="color-87b8ff">Фото_уставшего_лица.jpg</div>
						</div>
					</div>
				</div>
				<div class="col-12">
					<div class="p-4 border-e4 radius-10">
						<div class="text-13 weight-500 px-2 pt-1">
							<div class="color-8e mb-2">Введенный текст:</div>
							<div class="color-87b8ff">Я устал ждать машину, когда она уже приедет в Россию, спасибо</div>
						</div>
					</div>
				</div>
			</div>
			<div class="row px-2 gy-3 mt-auto justify-content-center">
				<div class="col-12">
					<a href="#" class="btn _outline">
						<span class="weight-600">Вернутся назад</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#back"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
