<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Реферальная ссылка</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-bar">
				<div class="row">
					<div class="col-auto">
						<a class="btn-dark">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon _arrow" width="8" height="13">
									<use href="img/svg/sprite.svg#arrow-bold"></use>
								</svg>
							</div>
						</a>
					</div>
					<div class="col">
						<a class="btn-dark d-flex">
							<div class="btn-dark__inner">
								<img class="header__logo mt-1" src="img/logo.png" alt="logo" />
							</div>
						</a>
					</div>
					<div class="col-auto">
						<a class="btn-dark _inverse">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon" width="18" height="18">
									<use href="img/svg/sprite.svg#user-people"></use>
								</svg>
							</div>
						</a>
					</div>
				</div>
			</div>
			<div class="header-content px-3 text-center">
				<h1 class="heading-2">Реферальная ссылка</h1>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
			<div class="header-bg">
				<img src="img/header/auto-4.jpg" alt="#" />
			</div>
		</header>

		<main class="main-content px-4">
			<div class="block-white radius-10 mb-5">
				<form class="row gy-3 mb-3">
					<div class="col-12">
						<div class="weight-500 color-777">Ваша ссылка</div>
					</div>
					<div class="col-12">
						<input class="input _normal _white" type="text" name="name" placeholder="https://forma-est.ru?invite=698883" />
					</div>
					<div class="col-12">
						<button class="btn _primary _normal">
							<span class="weight-600">Скопировать</span>
						</button>
					</div>
				</form>
			</div>

			<div class="row gy-3 mb-5">
				<div class="col-12">
					<a href="#" class="btn">
						<span class="weight-600">Наклейка на стекло</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#entry"></use>
						</svg>
					</a>
				</div>
				<div class="col-12">
					<a href="#" class="btn _white-gray">
						<span class="weight-600">Условия программы</span>
					</a>
				</div>
				<div class="col-12">
					<a href="#" class="btn _white-gray">
						<span class="weight-600">
							Как наклеить наклейку <br />
							на заднее стекло?
						</span>
					</a>
				</div>
				<div class="col-12">
					<a href="#" class="btn _white-gray">
						<span class="weight-600">
							Как будет выглядеть наклейка <br />
							на заднем стекле?
						</span>
					</a>
				</div>
				<div class="col-12">
					<a href="#" class="btn _white-gray">
						<span class="weight-600">
							Какие размеры <br />
							и материал использовать?
						</span>
					</a>
				</div>
			</div>

			<h4 class="text-15 mb-4">Статистика</h4>
			<div class="row gy-4 mb-4">
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3 mb-5">
							<div class="col align-self-center">
								<h5 class="text-13">Консультация</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="12" height="10"><use href="img/svg/sprite.svg#partners"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="mt-auto text-20 weight-500"> 0 </span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/question.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3 mb-5">
							<div class="col align-self-center">
								<h5 class="text-13">Поиск авто</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="11" height="9"><use href="img/svg/sprite.svg#car"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="mt-auto text-20 weight-500"> 0 </span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/car.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3 mb-5">
							<div class="col align-self-center">
								<h5 class="text-13">Отказ</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="10" height="10"><use href="img/svg/sprite.svg#refusal"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="mt-auto text-20 weight-500"> 0 </span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/refusal.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3 mb-5">
							<div class="col align-self-center">
								<h5 class="text-13">К выплане</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="12" height="12"><use href="img/svg/sprite.svg#wallet"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="mt-auto text-20 weight-500"> 0 </span>
							<div class="card-dark__category-img _width-108">
								<img class="img-cover" src="img/category/money.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
			</div>

			<div class="card-primary mb-5">
				<div class="card-primary__inner">
					<div class="badge-primary">
						<div class="badge-primary__inner">
							<span class="text-15 weight-600">Заработано:</span>
							<span class="text-15 weight-600">0₽</span>
						</div>
					</div>
				</div>
				<div class="card-primary__img height-auto">
					<img class="img-cover" src="img/mercedes-sm.png" alt="#" />
				</div>
			</div>

			<div class="position-fixed-btn">
				<div class="position-fixed-btn__inner">
					<a href="#" class="btn _outline">
						<span class="weight-600">Вернутся в меню</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#back"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
