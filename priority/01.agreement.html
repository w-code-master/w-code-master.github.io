<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Авторизация</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-content">
				<div class="d-flex justify-content-center mt-5 mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center pt-2 pb-4">
					<h1 class="heading-1 color-eee mb-3 anim-fadeInUp">Авторизация</h1>
					<p class="header__description weight-500 anim-fadeInUp delay-01s">Войдите в свой аккаунт, чтобы продолжить</p>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content px-5">
			<div class="block-white radius-10 mx-1 mb-4 anim-fadeInLeft">
				<form class="row gy-4 px-2">
					<div class="col-12">
						<p class="color-black text-14 weight-500 line-height-140">
							Для продолжения ознакомьтесь
							<a class="link _black" href="#">с&nbsp;<span class="weight-700">политикой конфиденциальности</span></a>
						</p>
					</div>
					<div class="col-12">
						<div class="choise">
							<label class="choise-checkbox">
								<input class="choise-checkbox__input" type="checkbox" id="swJ86Plus6w" />
								<span class="choise-checkbox__box"></span>
							</label>
							<label class="choise__text weight-500 pe-3" for="swJ86Plus6w">Я согласен с условиями обработки персональных&nbsp;данных</label>
						</div>
					</div>
				</form>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
