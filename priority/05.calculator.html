<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Калькулятор ТС</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-content">
				<div class="d-flex justify-content-center mt-5 mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center pt-2 pb-4">
					<h2 class="heading-2 color-eee mb-3 anim-fadeInUp">Калькулятор ТС</h2>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content">
			<div class="block-white radius-10 mb-4 anim-fadeInLeft">
				<h6 class="pt-2 pb-2 mb-1 text-15">Для самостоятельного предварительного расчета&nbsp;ТС, воспользуйтесь на выбор:</h6>
				<ul class="list pt-3 pb-2 text-13">
					<li class="list__item">
						<div class="list__content"><span class="color-8e">Калькулятор по ссылке</span></div>
					</li>
					<li class="list__item">
						<div class="list__content"><span class="color-8e">Калькулятор с самостоятельным вводом данных</span></div>
					</li>
				</ul>
			</div>
			<div class="row gy-3 px-4 mx-0 mt-auto justify-content-center">
				<div class="col-12 px-2 anim-bounceIn">
					<a href="#" class="btn">
						<span class="weight-500">Калькулятор по ссылкам</span>
					</a>
				</div>
				<div class="col-12 px-2 anim-bounceIn delay-01s">
					<a href="#" class="btn">
						<span class="weight-500">Самостоятельный расчет</span>
					</a>
				</div>
				<div class="col-12 px-2 anim-bounceIn delay-015s">
					<a href="#" class="btn _primary">
						<span class="weight-500">Вернутся назад</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#back"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
