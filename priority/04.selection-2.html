<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Заявка на подбор</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-bar">
				<div class="row">
					<div class="col-auto">
						<a class="btn-dark">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon _arrow" width="8" height="13">
									<use href="img/svg/sprite.svg#arrow-bold"></use>
								</svg>
							</div>
						</a>
					</div>
					<div class="col">
						<a class="btn-dark d-flex">
							<div class="btn-dark__inner">
								<img class="header__logo mt-1" src="img/logo.png" alt="logo" />
							</div>
						</a>
					</div>
					<div class="col-auto">
						<a class="btn-dark _inverse">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon" width="18" height="18">
									<use href="img/svg/sprite.svg#user-people"></use>
								</svg>
							</div>
						</a>
					</div>
				</div>
			</div>
			<div class="header-content px-3 text-center">
				<h1 class="heading-2">Заявка на подбор</h1>
				<p class="header__description weight-500">
					Пройдите опрос из 3х шагов и менеджер <br />
					свяжется с вами в ближайшее время
				</p>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
			<div class="header-bg">
				<img src="img/header/auto-2.jpg" alt="#" />
			</div>
		</header>

		<main class="main-content px-4">
			<div class="block-white radius-10 mb-4">
				<div class="row gy-3 mb-3">
					<div class="col-12">
						<div class="d-flex">
							<div class="badge align-self-start">Шаг&nbsp;2</div>
							<p class="px-3 py-1 text-13 weight-500">Напишите пробег</p>
						</div>
					</div>
					<div class="col-12">
						<form>
							<input class="input _white" type="text" name="model-tc" placeholder="2021 год, 20т. км пробег" />
						</form>
					</div>
				</div>
			</div>
			<div class="py-3 mb-4">
				<h6 class="pt-1 pb-2 mb-1 text-15">Введенные данные:</h6>
				<ul class="list py-3 text-13">
					<li class="list__item">
						<div class="list__content"><span class="color-8e">Марка, модель ТС:</span> Honda Freed 1.5 G Honda</div>
					</li>
				</ul>
			</div>
			<div class="row gy-3 mt-auto">
				<div class="col-12 px-2">
					<a href="#" class="btn _primary">
						<span class="weight-600">Продолжить</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#entry"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
