<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Регистрация</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-content">
				<div class="d-flex justify-content-center mb-4">
					<img class="header__logo" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center">
					<h1 class="heading-1 mb-3">Регистрация</h1>
					<p class="weight-500 color-d4">Заполните данные для регистрации в приложении</p>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content">
			<div class="block-white">
				<form class="row gy-4">
					<div class="col-12">
						<input type="text" placeholder="Ваше имя" />
					</div>
					<div class="col-12">
						<input type="tel" placeholder="+7 (999) 999-99-99" />
					</div>
					<div class="col-12">
						<button class="btn" type="submit">
							<span class="weight-500">Войти</span>
						</button>
					</div>
					<div class="col-12 text-14 text-center weight-500">
						<span class="color-8e">Уже есть аккаунт?</span>
						<a class="link _black" href="#">Войти</a>
					</div>
				</form>
			</div>
		</main>
	</body>
</html>
