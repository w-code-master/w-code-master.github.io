<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Заявка на подбор</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-bar">
				<div class="row">
					<div class="col-auto">
						<a class="btn-dark">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon _arrow" width="8" height="13">
									<use href="img/svg/sprite.svg#arrow-bold"></use>
								</svg>
							</div>
						</a>
					</div>
					<div class="col">
						<a class="btn-dark d-flex">
							<div class="btn-dark__inner">
								<img class="header__logo mt-1" src="img/logo.png" alt="logo" />
							</div>
						</a>
					</div>
					<div class="col-auto">
						<a class="btn-dark _inverse">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon" width="18" height="18">
									<use href="img/svg/sprite.svg#user-people"></use>
								</svg>
							</div>
						</a>
					</div>
				</div>
			</div>
			<div class="header-content px-3 text-center">
				<h1 class="heading-2">Партнерская программа</h1>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
			<div class="header-bg">
				<img src="img/header/auto-2.jpg" alt="#" />
			</div>
		</header>

		<main class="main-content px-4">
			<div class="bg-primarylight radius-15 p-4 mb-5">
				<div class="px-2 py-3 text-15 color-white line-height-125">
					<h6 class="text-15 mb-4">
						Дополнительный <br />
						заработок для всех!
					</h6>
					<p class="pe-5 me-5 weight-300" style="max-width: 240px">
						Стань партнером компании, привози ТС&nbsp;вместе <br />
						с&nbsp;нами и&nbsp;получай лучшие условия на&nbsp;рынке&nbsp;РФ
					</p>
				</div>
				<div class="bg-image-right">
					<img class="img-cover" src="img/graphica/mercedes.png" alt="#" />
				</div>
			</div>
			<div class="row justify-content-center gy-4 mb-5">
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Договор</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="9" height="11"><use href="img/svg/sprite.svg#doc-text"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/doc-1.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Условия</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="12" height="10"><use href="img/svg/sprite.svg#partners"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/doc-2.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
			</div>
			<div class="row gy-3 mt-auto">
				<div class="col-12 px-2">
					<a href="#" class="btn">
						<span class="weight-600">Вернутся в меню</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#mail"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
