<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Партнерская программа</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-content">
				<div class="d-flex justify-content-center mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center pt-2 pb-4">
					<h2 class="heading-2 color-eee mb-3 anim-fadeInUp">Партнерская программа Priority&nbsp;Auto</h2>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content px-4">
			<div class="bg-primarylight _graphica-mercedes radius-15 p-4 mx-2 mb-5 anim-fadeInLeft">
				<div class="px-2 py-3 text-15 color-white line-height-125">
					<h6 class="text-15 mb-4">
						Дополнительный <br />
						заработок для всех!
					</h6>
					<p class="pe-5 me-5" style="max-width: 240px">
						Стань партнером компании, привози ТС&nbsp;вместе <br />
						с&nbsp;нами и&nbsp;получай лучшие условия на&nbsp;рынке&nbsp;РФ
					</p>
				</div>
			</div>
			<div class="row gy-3 mx-0 mt-auto justify-content-center">
				<div class="col-6 px-2 anim-bounceIn">
					<a href="#" class="btn">
						<span class="weight-500">Договор</span>
					</a>
				</div>
				<div class="col-6 px-2 anim-bounceIn delay-01s">
					<a href="#" class="btn">
						<span class="weight-500">Условия</span>
					</a>
				</div>
				<div class="col-6 px-2 anim-bounceIn delay-015s">
					<a href="#" class="btn">
						<span class="weight-500">Оставить заявку</span>
					</a>
				</div>
				<div class="col-6 px-2 anim-bounceIn delay-02s">
					<a href="#" class="btn _primary">
						<span class="weight-500">Вернутся назад</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#back"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
