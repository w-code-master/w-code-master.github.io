<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Авторизация</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-bar">
				<div class="row">
					<div class="col-auto">
						<a class="btn-dark">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon _arrow" width="8" height="13">
									<use href="img/svg/sprite.svg#arrow-bold"></use>
								</svg>
							</div>
						</a>
					</div>
					<div class="col">
						<a class="btn-dark d-flex">
							<div class="btn-dark__inner">
								<img class="header__logo mt-1" src="img/logo.png" alt="logo" />
							</div>
						</a>
					</div>
					<div class="col-auto">
						<a class="btn-dark _inverse">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon" width="18" height="18">
									<use href="img/svg/sprite.svg#user-people"></use>
								</svg>
							</div>
						</a>
					</div>
				</div>
			</div>
			<div class="header-content mb-4"> </div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
			<div class="header-bg">
				<img src="img/header/auto-2.jpg" alt="#" />
			</div>
		</header>

		<main class="main-content">
			<div class="row justify-content-center px-4 gy-4 mb-5">
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Автомобили</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="11" height="9"><use href="img/svg/sprite.svg#car"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/car.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Мототранспорт</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="12" height="8"><use href="img/svg/sprite.svg#moto"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/moto.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
			</div>

			<h4 class="text-15 px-4 mb-4">Новости и акции</h4>
			<div class="swiper sliderCards mb-5">
				<div class="swiper-wrapper">
					<div class="swiper-slide">
						<a class="sliderCards__card" href="#">
							<img class="img-cover" src="img/slider-cards/01.jpg" alt="#" />
						</a>
					</div>
					<div class="swiper-slide">
						<a class="sliderCards__card" href="#">
							<img class="img-cover" src="img/slider-cards/01.jpg" alt="#" />
						</a>
					</div>
					<div class="swiper-slide">
						<a class="sliderCards__card" href="#">
							<img class="img-cover" src="img/slider-cards/01.jpg" alt="#" />
						</a>
					</div>
					<div class="swiper-slide">
						<a class="sliderCards__card" href="#">
							<img class="img-cover" src="img/slider-cards/01.jpg" alt="#" />
						</a>
					</div>
				</div>
			</div>

			<div class="px-4 mb-5">
				<div class="card-primary">
					<div class="card-primary__inner">
						<h5 class="text-15 mb-4">Программа лояльности</h5>
						<div class="mb-4">
							<div class="badge-primary">
								<div class="badge-primary__inner">
									<span class="text-15 weight-600">Заработано:</span>
									<span class="text-18 weight-600">0₽</span>
								</div>
							</div>
						</div>
						<a class="link _dashed _white weight-600" href="#">Подробнее</a>
					</div>
					<div class="card-primary__img">
						<img class="img-cover" src="img/mercedes.png" alt="#" />
					</div>
				</div>
			</div>

			<h4 class="text-15 px-4 mb-4">Автомобили из Азии</h4>
			<div class="row justify-content-center px-3 g-3 mb-5">
				<div class="col-4">
					<a class="card-dark" href="#">
						<div class="row p-3 g-1 align-items-center">
							<div class="col">
								<h5 class="text-13">Япония</h5>
							</div>
							<div class="col-auto">
								<div class="flag-icon _small">
									<img src="img/flags/japan.jpg" alt="japan" />
								</div>
							</div>
							<div class="col-12 color-87b8ff text-10">Цены в РФ</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img _width-55">
								<img class="img-cover" src="img/category/japan.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-4">
					<a class="card-dark" href="#">
						<div class="row p-3 g-1 align-items-center">
							<div class="col">
								<h5 class="text-13">Китай</h5>
							</div>
							<div class="col-auto">
								<div class="flag-icon _small">
									<img src="img/flags/china.jpg" alt="china" />
								</div>
							</div>
							<div class="col-12 color-87b8ff text-10">Цены в РФ</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img _width-55">
								<img class="img-cover" src="img/category/china.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-4">
					<a class="card-dark" href="#">
						<div class="row p-3 g-1 align-items-center">
							<div class="col">
								<h5 class="text-13">Корея</h5>
							</div>
							<div class="col-auto">
								<div class="flag-icon _small">
									<img src="img/flags/korea.jpg" alt="korea" />
								</div>
							</div>
							<div class="col-12 color-87b8ff text-10">Цены в РФ</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img _width-55">
								<img class="img-cover" src="img/category/corea.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
			</div>

			<h4 class="text-15 px-4 mb-4">Меню</h4>
			<div class="row justify-content-center px-4 gy-4 mb-5">
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Отзывы</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="12" height="12"><use href="img/svg/sprite.svg#shield"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/review.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Калькулятор ТС</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="9" height="10"><use href="img/svg/sprite.svg#calc"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/calc.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13"> Услуги и&nbsp;документы </h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="9" height="11"><use href="img/svg/sprite.svg#doc-text"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/doc-1.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Стать партнером</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="12" height="10"><use href="img/svg/sprite.svg#partners"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/doc-2.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Кредитование</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="12" height="12"><use href="img/svg/sprite.svg#credit"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/credit.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
				<div class="col-6">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Для Юр. лиц</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="12" height="10"><use href="img/svg/sprite.svg#partners"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img">
								<img class="img-cover" src="img/category/doc-3.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
			</div>

			<div class="px-4 pt-3">
				<a class="btn" href="#">
					<span class="weight-500">бесплатная консультация</span>
					<svg class="btn__icon _fill-stroke" width="14" height="14">
						<use href="img/svg/sprite.svg#mail"></use>
					</svg>
				</a>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/swiper.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
