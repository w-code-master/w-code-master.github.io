<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Telegram бот!</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header pt-5">
			<div class="header-content">
				<div class="d-flex justify-content-center mb-4">
					<img class="header__logo anim-zoomIn" src="img/logo.png" alt="logo" />
				</div>
				<div class="text-center pt-2 pb-4">
					<h2 class="heading-2 color-eee mb-3 anim-fadeInUp">Благодарим за&nbsp;авторизацию в&nbsp;нашем Telegram боте!</h2>
				</div>
				<div class="text-center mb-3 pb-1 color-eee anim-fadeInDown delay-01s">Наши социальные сети:</div>
				<div class="row justify-content-center mb-4 pb-2 g-3">
					<div class="col-auto anim-bounceIn delay-015s">
						<a href="#" class="btn _instagram">
							<svg class="btn__icon" width="16" height="16">
								<use href="img/svg/sprite.svg#instagram"></use>
							</svg>
							<span class="weight-500">Instagram</span>
						</a>
					</div>
					<div class="col-auto anim-bounceIn delay-025s">
						<a href="#" class="btn _youtube">
							<svg class="btn__icon" width="20" height="13">
								<use href="img/svg/sprite.svg#youtube"></use>
							</svg>
							<span class="weight-500">Youtube</span>
						</a>
					</div>
				</div>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
		</header>

		<main class="main-content px-4">
			<div class="bg-primarylight _graphica-gift radius-10 p-4 mx-3 mb-5 anim-fadeInLeft">
				<div class="color-white p-3">
					<h4 class="heading-4 weight-400 mb-4 pb-2">
						<strong class="weight-600">Внимание!</strong> <br />
						Проводится розыгрыш
					</h4>
					<a href="#" class="btn _white d-inline-flex px-6">
						<span class="weight-500">Участвовать</span>
						<svg class="btn__icon _fill-stroke" width="14" height="14">
							<use href="img/svg/sprite.svg#gift"></use>
						</svg>
					</a>
				</div>
			</div>
			<div class="px-2 py-3">
				<div class="row g-3 mt-3 justify-content-center">
					<div class="col-12 anim-bounceIn">
						<a href="#" class="btn">
							<span class="weight-500">Заявка на подбор</span>
							<svg class="btn__icon _fill-stroke" width="14" height="14">
								<use href="img/svg/sprite.svg#mail"></use>
							</svg>
						</a>
					</div>
					<div class="col-6 anim-bounceIn delay-01s">
						<a href="#" class="btn _white">
							<span class="text-11 weight-600 color-black">Отзывы</span>
							<svg class="btn__icon _fill-stroke" width="13" height="13">
								<use href="img/svg/sprite.svg#chat"></use>
							</svg>
						</a>
					</div>
					<div class="col-6 anim-bounceIn delay-02s">
						<a href="#" class="btn _white">
							<span class="text-11 weight-600 color-black">Услуги и документы</span>
							<svg class="btn__icon _fill-stroke" width="12" height="12">
								<use href="img/svg/sprite.svg#layers"></use>
							</svg>
						</a>
					</div>
					<div class="col-6 anim-bounceIn delay-01s">
						<a href="#" class="btn _white">
							<span class="text-11 weight-600 color-black">Калькулятор ТС</span>
							<svg class="btn__icon _fill-stroke" width="10" height="12">
								<use href="img/svg/sprite.svg#calc"></use>
							</svg>
						</a>
					</div>
					<div class="col-6 anim-bounceIn delay-02s">
						<a href="#" class="btn _white">
							<span class="text-11 weight-600 color-black">Стать партнером</span>
							<svg class="btn__icon _fill-stroke" width="14" height="14">
								<use href="img/svg/sprite.svg#partners"></use>
							</svg>
						</a>
					</div>
					<div class="col-6 anim-bounceIn delay-01s">
						<a href="#" class="btn _white">
							<span class="text-11 weight-600 color-black">Кредитование</span>
							<svg class="btn__icon _fill-stroke" width="13" height="13">
								<use href="img/svg/sprite.svg#credit"></use>
							</svg>
						</a>
					</div>
					<div class="col-6 anim-bounceIn delay-02s">
						<a href="#" class="btn _white">
							<span class="text-11 weight-600 color-black">Для Юр. лиц</span>
							<svg class="btn__icon _fill-stroke" width="14" height="14">
								<use href="img/svg/sprite.svg#id"></use>
							</svg>
						</a>
					</div>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/animate-css.js" defer></script>
		<script src="js/waypoints.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
