<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Priority Auto - Заявка на подбор</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- favicon -->
		<link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
		<link rel="shortcut icon" href="img/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="img/favicon/site.webmanifest" />

		<!-- style -->
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="header">
			<div class="header-bar">
				<div class="row">
					<div class="col-auto">
						<a class="btn-dark">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon _arrow" width="8" height="13">
									<use href="img/svg/sprite.svg#arrow-bold"></use>
								</svg>
							</div>
						</a>
					</div>
					<div class="col">
						<a class="btn-dark d-flex">
							<div class="btn-dark__inner">
								<img class="header__logo mt-1" src="img/logo.png" alt="logo" />
							</div>
						</a>
					</div>
					<div class="col-auto">
						<a class="btn-dark _inverse">
							<div class="btn-dark__inner">
								<svg class="btn-dark__icon" width="18" height="18">
									<use href="img/svg/sprite.svg#user-people"></use>
								</svg>
							</div>
						</a>
					</div>
				</div>
			</div>
			<div class="header-content px-3">
				<h1 class="heading-2">
					Кредитование <br />
					с аккредитацией <br />
					от Priority Auto
				</h1>
				<p class="header__description weight-500">
					Наша компания имеет специальное соглашение <br />
					со следующими банками на получение <br />
					кредита при работе с нами
				</p>
			</div>
			<div class="header-area">
				<div class="header-area__lighter"></div>
			</div>
			<div class="header-bg">
				<img src="img/header/auto-2.jpg" alt="#" />
			</div>
		</header>

		<main class="main-content px-4">
			<div class="block-white radius-15 px-0 mb-5">
				<div class="list _border pt-2 text-15 weight-600">
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">Сбербанк</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/sberbank.svg" alt="sberbank" />
							</div>
						</div>
					</div>
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">ВТБ</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/vtb.svg" alt="vtb" />
							</div>
						</div>
					</div>
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">ПСБ</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/psb.svg" alt="psb" />
							</div>
						</div>
					</div>
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">Альфа банк</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/alfabank.svg" alt="alfabank" />
							</div>
						</div>
					</div>
					<div class="list__item px-20">
						<div class="row py-2 align-items-center">
							<div class="col">Т-банк</div>
							<div class="col-auto">
								<img class="d-block" src="img/svg/logos/tbank.svg" alt="tbank" />
							</div>
						</div>
					</div>
				</div>
			</div>
			<p class="text-center text-15 weight-600 color-53 mb-5">
				Ознакомьтесь с условиями получения <br />
				кредита для покупки ТС за границей
			</p>
			<div class="row justify-content-center gy-4 mb-5">
				<div class="col-12">
					<a class="card-dark" href="#">
						<div class="row p-3">
							<div class="col align-self-center">
								<h5 class="text-13">Условия</h5>
							</div>
							<div class="col-auto">
								<div class="icon">
									<svg width="12" height="10"><use href="img/svg/sprite.svg#partners"></use></svg>
								</div>
							</div>
						</div>
						<div class="card-dark__category">
							<span class="icon-link mt-auto">
								<svg width="5" height="5"><use href="img/svg/sprite.svg#right-up"></use></svg>
							</span>
							<div class="card-dark__category-img _width-165">
								<img class="img-cover" src="img/category/doc-7.png" alt="#" />
							</div>
						</div>
					</a>
				</div>
			</div>
			<div class="position-fixed-btn">
				<div class="position-fixed-btn__inner">
					<a href="#" class="btn">
						<span class="weight-600">бесплатная консультация</span>
						<svg class="btn__icon _fill-stroke" width="15" height="15">
							<use href="img/svg/sprite.svg#entry"></use>
						</svg>
					</a>
				</div>
			</div>
		</main>

		<script src="js/jquery.js" defer></script>
		<script src="js/masked.js" defer></script>
		<script src="js/main.js" defer></script>
	</body>
</html>
